name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Keep PR checks fresh, but let push/tag/manual builds finish so a version
  # bump cannot be canceled by a later non-version commit on the same ref.
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.ref) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  version:
    name: Detect version change
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      publish: ${{ steps.detect.outputs.publish }}
      should_tag: ${{ steps.detect.outputs.should_tag }}
      tag: ${{ steps.detect.outputs.tag }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release target
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./package.json').version")"
          previous_sha="${{ github.event.before }}"

          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${current_version}" >> "$GITHUB_OUTPUT"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "publish=false" >> "$GITHUB_OUTPUT"
          echo "should_tag=false" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            if [[ "$version" != "$current_version" ]]; then
              echo "::error::Tag ${tag} does not match package.json version ${current_version}."
              exit 1
            fi

            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Building tagged release ${tag}."
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Manual builds must target a v* tag to produce release artifacts."
            exit 0
          fi

          if [[ -z "$previous_sha" || "$previous_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "No previous commit is available for version comparison."
            exit 0
          fi

          if ! git cat-file -e "${previous_sha}^{commit}"; then
            echo "Previous commit ${previous_sha} is not available locally."
            exit 0
          fi

          previous_version="$(git show "${previous_sha}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"

          if [[ "$current_version" != "$previous_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "should_tag=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${previous_version} -> ${current_version}; release tag will be created."
          else
            echo "Version unchanged: ${current_version}"
          fi

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Version consistency
        run: npm run version:check

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  create-release-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    needs:
      - checks
      - version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version.outputs.should_tag == 'true'
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and dispatch release build
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}^{commit}" >/dev/null; then
            tag_sha="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
            if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
              echo "Tag ${TAG_NAME} already points to ${tag_sha}, not ${GITHUB_SHA}."
              exit 1
            fi

            if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release ${TAG_NAME} already exists; skipping release dispatch."
              exit 0
            fi

            echo "Tag ${TAG_NAME} already exists; dispatching release build at the tag."
            gh workflow run build.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG_NAME"
            exit 0
          fi

          git tag "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/${TAG_NAME}"
          gh workflow run build.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG_NAME"

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs:
      - checks
      - version
    if: startsWith(github.ref, 'refs/tags/v') && needs.version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact_name: IwaraTV-windows
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              release/IwaraTV_*_x64-portable.exe
              release/IwaraTV_*_x64-unpacked.zip
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact_name: IwaraTV-macos
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            os: ubuntu-22.04
            bundles: deb,appimage
            artifact_name: IwaraTV-linux
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons:build

      - name: Install bundled MPV
        if: runner.os == 'Windows'
        run: npm run mpv:update

      - name: Build Tauri app
        run: npm run build:tauri -- --bundles ${{ matrix.bundles }}

      - name: Package Windows portable artifacts
        if: runner.os == 'Windows'
        run: npm run release:portable:win

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - version
    if: startsWith(github.ref, 'refs/tags/v') && needs.version.outputs.publish == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp '{}' release-assets/ \;
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
          ls -lah release-assets

      - name: Create release notes
        env:
          TAG_NAME: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          changelog_base=""
          changelog_label=""

          previous_version=""
          previous_sha=""
          for commit in $(git rev-list --first-parent "$GITHUB_SHA"); do
            commit_version="$(git show "${commit}:package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null || true)"
            if [[ -n "$commit_version" ]] && [[ "$commit_version" != "$VERSION" ]]; then
              previous_version="$commit_version"
              previous_sha="$commit"
              break
            fi
          done

          if [[ -n "$previous_version" ]]; then
            previous_tag="v${previous_version}"
            if git rev-parse -q --verify "refs/tags/${previous_tag}^{commit}" >/dev/null && git merge-base --is-ancestor "${previous_tag}^{commit}" "$GITHUB_SHA"; then
              changelog_base="$previous_tag"
              changelog_label="$previous_tag"
            else
              changelog_base="$previous_sha"
              changelog_label="${previous_version} baseline (${previous_sha:0:7})"
            fi
          else
            previous_tag="$(git tag --merged "$GITHUB_SHA" --list "v*" --sort=-v:refname | grep -vx "$TAG_NAME" | head -n 1 || true)"
            if [[ -n "$previous_tag" ]]; then
              changelog_base="$previous_tag"
              changelog_label="$previous_tag"
            fi
          fi

          {
            echo "## Assets"
            echo
            echo "- Windows installer: \`IwaraTV_${VERSION}_x64-setup.exe\`"
            echo "- Windows portable package: \`IwaraTV_${VERSION}_x64-portable.exe\`"
            echo "- Windows unpacked archive: \`IwaraTV_${VERSION}_x64-unpacked.zip\`"
            echo "- macOS disk image: \`*.dmg\`"
            echo "- Linux packages: \`*.deb\` and \`*.AppImage\`"
            echo "- Checksums: \`SHA256SUMS.txt\`"
            echo
            echo "## Changelog"
            echo

            if [[ -n "$changelog_base" ]]; then
              echo "Changes since ${changelog_label}:"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" "${changelog_base}..${GITHUB_SHA}"
            else
              echo "Initial release notes:"
              echo
              git log --no-merges --pretty=format:"- %s (%h)" "$GITHUB_SHA"
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; skipping publish."
            exit 0
          fi

          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md
