name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact_name: IwaraTV-windows
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact_name: IwaraTV-macos
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            os: ubuntu-22.04
            bundles: deb,appimage
            artifact_name: IwaraTV-linux
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons:build

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Install bundled MPV
        if: runner.os == 'Windows'
        run: npm run mpv:update

      - name: Build Tauri app
        run: npm run build:tauri -- --bundles ${{ matrix.bundles }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp '{}' release-assets/ \;
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
          ls -lah release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes "Cross-platform IwaraTV build artifacts."
