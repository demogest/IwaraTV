name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Detect version change
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      publish: ${{ steps.detect.outputs.publish }}
      tag: ${{ steps.detect.outputs.tag }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release target
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./package.json').version")"
          previous_sha="${{ github.event.before }}"

          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${current_version}" >> "$GITHUB_OUTPUT"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "publish=false" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual build for ${current_version}; release publish is disabled."
            exit 0
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Building tagged release ${tag}."
            exit 0
          fi

          if [[ -z "$previous_sha" || "$previous_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "No previous commit is available for version comparison."
            exit 0
          fi

          if ! git cat-file -e "${previous_sha}^{commit}"; then
            echo "Previous commit ${previous_sha} is not available locally."
            exit 0
          fi

          previous_version="$(git show "${previous_sha}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"

          if [[ "$current_version" != "$previous_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${previous_version} -> ${current_version}"
          else
            echo "Version unchanged: ${current_version}"
          fi

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs:
      - checks
      - version
    if: needs.version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis
            artifact_name: IwaraTV-windows
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              release/IwaraTV_*_x64-portable.exe
              release/IwaraTV_*_x64-unpacked.zip
          - name: macOS
            os: macos-latest
            bundles: dmg
            artifact_name: IwaraTV-macos
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            os: ubuntu-22.04
            bundles: deb,appimage
            artifact_name: IwaraTV-linux
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons:build

      - name: Install bundled MPV
        if: runner.os == 'Windows'
        run: npm run mpv:update

      - name: Build Tauri app
        run: npm run build:tauri -- --bundles ${{ matrix.bundles }}

      - name: Package Windows portable artifacts
        if: runner.os == 'Windows'
        run: npm run release:portable:win

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - version
    if: needs.version.outputs.publish == 'true'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp '{}' release-assets/ \;
          (cd release-assets && sha256sum * > SHA256SUMS.txt)
          ls -lah release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.version.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; skipping publish."
            exit 0
          fi

          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes "Cross-platform IwaraTV build artifacts."
